<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Share List</title>
  <style>
    :root {
      --bg: #0f1115;
      --surface: #171a21;
      --surface-2: #1d222b;
      --line: #2a303b;
      --text: #f5f7fb;
      --muted: #9ca6b8;
      --accent: #e9edf7;
      --accent-text: #0e1117;
      --danger: #ff8c8c;
      --radius: 20px;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0c0e12 0%, #10141b 100%);
      min-height: 100vh;
    }

    .wrap {
      width: min(1120px, calc(100vw - 28px));
      margin: 22px auto 36px;
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .left {
      position: sticky;
      top: 18px;
      align-self: start;
    }

    .section {
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child { border-bottom: none; }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.12;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #dbe2f0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    input[type="text"], textarea {
      width: 100%;
      border: 1px solid #313846;
      background: var(--surface-2);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 15px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
      resize: vertical;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: #778197;
      box-shadow: 0 0 0 4px rgba(255,255,255,.06);
    }

    textarea {
      min-height: 112px;
      line-height: 1.6;
    }

    .thumb-pick {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .file {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px dashed #4a5365;
      background: var(--surface-2);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .file input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .thumb-preview {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: #13161d;
      display: none;
    }

    .thumb-name {
      max-width: 200px;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      padding: 13px 18px;
      cursor: pointer;
      transition: transform .12s ease, opacity .18s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary {
      background: var(--accent);
      color: var(--accent-text);
    }

    .secondary {
      background: #252b35;
      color: var(--text);
      border: 1px solid #39404c;
    }

    .ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid #353c49;
    }

    .tiny {
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 12px;
    }

    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .count {
      font-size: 13px;
      color: var(--muted);
    }

    .draft-list {
      display: grid;
      gap: 12px;
    }

    .draft-item {
      display: grid;
      grid-template-columns: 62px 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 12px;
      background: var(--surface-2);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 18px;
    }

    .draft-cover {
      width: 62px;
      height: 62px;
      border-radius: 14px;
      object-fit: cover;
      background: #12161d;
      border: 1px solid rgba(255,255,255,.06);
    }

    .draft-noimg,
    .share-noimg {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .draft-title {
      margin: 0 0 6px;
      font-size: 15px;
      line-height: 1.35;
    }

    .draft-reason {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .remove {
      color: var(--danger);
      background: rgba(255,140,140,.08);
      border: 1px solid rgba(255,140,140,.16);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .toolbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .tip {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .preview-wrap {
      padding: 20px;
      display: flex;
      justify-content: center;
      overflow: auto;
      max-height: calc(100vh - 120px);
    }

    .share-board {
      width: 820px;
      background: #11151c;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 18px 44px rgba(0,0,0,.26);
    }

    .board-top {
      margin-bottom: 20px;
    }

    .board-kicker {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: #edf1f8;
      color: #0f131a;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      margin-bottom: 14px;
    }

    .board-title {
      margin: 0 0 8px;
      font-size: 36px;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .board-sub {
      margin: 0;
      color: #a6b0c2;
      font-size: 15px;
      line-height: 1.65;
    }

    .share-items {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .share-item {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 16px;
      align-items: center;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 22px;
      padding: 14px;
    }

    .share-cover {
      width: 108px;
      height: 108px;
      border-radius: 18px;
      object-fit: cover;
      background: #181d26;
      border: 1px solid rgba(255,255,255,.06);
    }

    .share-song {
      margin: 0 0 8px;
      font-size: 23px;
      line-height: 1.25;
    }

    .share-reason {
      margin: 0;
      color: #d0d6e3;
      font-size: 15px;
      line-height: 1.72;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
      border: 1px dashed #384150;
      border-radius: 22px;
      background: rgba(255,255,255,.015);
    }

    .foot {
      margin-top: 18px;
      text-align: right;
      color: #8e98aa;
      font-size: 12px;
    }

    .status {
      margin-top: 12px;
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
      .left { position: static; }
      .preview-wrap { max-height: none; }
      .share-board { width: 100%; }
    }

    @media (max-width: 640px) {
      .wrap { width: calc(100vw - 18px); margin: 10px auto 22px; }
      .section, .toolbar, .preview-wrap { padding-left: 14px; padding-right: 14px; }
      .share-board { padding: 18px; border-radius: 22px; }
      .board-title { font-size: 28px; }
      .share-item { grid-template-columns: 82px 1fr; gap: 12px; }
      .share-cover { width: 82px; height: 82px; border-radius: 14px; }
      .share-song { font-size: 19px; }
      .share-reason { font-size: 14px; line-height: 1.65; }
      .draft-item { grid-template-columns: 56px 1fr auto; }
      .draft-cover { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel left">
      <div class="section">
        <h1>Media Share List</h1>
        <p class="sub">For music, games, films, shows, or anything else. Add items, build the list, then share it as a clean image.</p>
      </div>

      <div class="section">
        <label for="listTitle">List title (optional)</label>
        <input id="listTitle" type="text" placeholder="Example: 8 things I recommend this month" />
      </div>

      <div class="section">
        <label for="itemName">Item title</label>
        <input id="itemName" type="text" placeholder="Enter a title" />

        <div style="height:12px"></div>

        <label for="itemReason">Why recommend it</label>
        <textarea id="itemReason" placeholder="A short reason works best"></textarea>

        <div style="height:12px"></div>

        <label>Thumbnail (optional)</label>
        <div class="thumb-pick">
          <label class="file">
            Choose image
            <input id="thumbInput" type="file" accept="image/*" />
          </label>
          <img id="thumbPreview" class="thumb-preview" alt="thumbnail preview" />
          <div id="thumbName" class="thumb-name">No image selected</div>
        </div>

        <div style="height:14px"></div>

        <button id="addBtn" class="primary" style="width:100%;">Add item</button>
        <div id="status" class="status"></div>
      </div>

      <div class="section">
        <div class="list-head">
          <div>
            <strong>Items</strong>
            <div id="count" class="count">0 items</div>
          </div>
          <button id="clearBtn" class="ghost tiny">Clear all</button>
        </div>
        <div id="draftList" class="draft-list"></div>
      </div>
    </div>

    <div class="panel right">
      <div class="toolbar">
        <div>
          <h2>Preview</h2>
          <div class="tip">Build the list first. Then share it or save it as a PNG.</div>
        </div>
        <div class="row">
          <button id="buildBtn" class="secondary">Build list</button>
          <button id="shareBtn" class="primary">Share list</button>
        </div>
      </div>
      <div class="preview-wrap">
        <div id="shareBoard" class="share-board"></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'media-share-list-v2';
    const listTitleEl = document.getElementById('listTitle');
    const itemNameEl = document.getElementById('itemName');
    const itemReasonEl = document.getElementById('itemReason');
    const thumbInputEl = document.getElementById('thumbInput');
    const thumbPreviewEl = document.getElementById('thumbPreview');
    const thumbNameEl = document.getElementById('thumbName');
    const addBtn = document.getElementById('addBtn');
    const buildBtn = document.getElementById('buildBtn');
    const shareBtn = document.getElementById('shareBtn');
    const clearBtn = document.getElementById('clearBtn');
    const draftListEl = document.getElementById('draftList');
    const shareBoardEl = document.getElementById('shareBoard');
    const countEl = document.getElementById('count');
    const statusEl = document.getElementById('status');

    let items = [];
    let currentThumb = '';

    function uid() {
      return `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function setStatus(msg) {
      statusEl.textContent = msg || '';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        listTitle: listTitleEl.value.trim(),
        items
      }));
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (data && Array.isArray(data.items)) items = data.items;
        if (data && typeof data.listTitle === 'string') listTitleEl.value = data.listTitle;
      } catch (e) {}
    }

    function resetThumbInput() {
      currentThumb = '';
      thumbInputEl.value = '';
      thumbPreviewEl.style.display = 'none';
      thumbPreviewEl.src = '';
      thumbNameEl.textContent = 'No image selected';
    }

    function renderDraftList() {
      countEl.textContent = `${items.length} ${items.length === 1 ? 'item' : 'items'}`;
      if (!items.length) {
        draftListEl.innerHTML = `<div class="empty" style="padding:24px 14px;">No items yet.</div>`;
        return;
      }

      draftListEl.innerHTML = items.map(item => `
        <div class="draft-item">
          ${item.thumb ? `<img class="draft-cover" src="${item.thumb}" alt="cover" />` : `<div class="draft-cover draft-noimg">No image</div>`}
          <div>
            <h3 class="draft-title">${escapeHtml(item.name)}</h3>
            <p class="draft-reason">${escapeHtml(item.reason)}</p>
          </div>
          <button class="remove tiny" data-id="${item.id}">Remove</button>
        </div>
      `).join('');

      draftListEl.querySelectorAll('[data-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          items = items.filter(item => item.id !== btn.dataset.id);
          save();
          renderDraftList();
          renderShareBoard();
        });
      });
    }

    function renderShareBoard() {
      const title = listTitleEl.value.trim() || 'Current Picks';
      if (!items.length) {
        shareBoardEl.innerHTML = `
          <div class="board-top">
            <div class="board-kicker">MEDIA PICKS</div>
            <h2 class="board-title">${escapeHtml(title)}</h2>
            <p class="board-sub">Your final shared image will appear here.</p>
          </div>
          <div class="empty">Empty list</div>
        `;
        return;
      }

      shareBoardEl.innerHTML = `
        <div class="board-top">
          <div class="board-kicker">MEDIA PICKS</div>
          <h2 class="board-title">${escapeHtml(title)}</h2>
          <p class="board-sub">${items.length} ${items.length === 1 ? 'item' : 'items'} · ready to share</p>
        </div>
        <div class="share-items">
          ${items.map(item => `
            <div class="share-item">
              ${item.thumb ? `<img class="share-cover" src="${item.thumb}" alt="cover" />` : `<div class="share-cover share-noimg">No image</div>`}
              <div>
                <h3 class="share-song">${escapeHtml(item.name)}</h3>
                <p class="share-reason">${escapeHtml(item.reason)}</p>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="foot">Generated locally</div>
      `;
      save();
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    thumbInputEl.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) {
        resetThumbInput();
        return;
      }
      try {
        currentThumb = await readFileAsDataURL(file);
        thumbPreviewEl.src = currentThumb;
        thumbPreviewEl.style.display = 'block';
        thumbNameEl.textContent = file.name;
      } catch (err) {
        setStatus('Image read failed. Try another file.');
        resetThumbInput();
      }
    });

    addBtn.addEventListener('click', () => {
      const name = itemNameEl.value.trim();
      const reason = itemReasonEl.value.trim();
      if (!name) {
        setStatus('Enter a title first.');
        return;
      }
      if (!reason) {
        setStatus('Add a short reason.');
        return;
      }

      items.push({
        id: uid(),
        name,
        reason,
        thumb: currentThumb || ''
      });

      itemNameEl.value = '';
      itemReasonEl.value = '';
      resetThumbInput();
      setStatus('Added.');
      save();
      renderDraftList();
    });

    buildBtn.addEventListener('click', () => {
      renderShareBoard();
      setStatus('List built.');
    });

    clearBtn.addEventListener('click', () => {
      items = [];
      save();
      renderDraftList();
      renderShareBoard();
      setStatus('Cleared.');
    });

    listTitleEl.addEventListener('input', save);

    function loadImage(src) {
      return new Promise((resolve) => {
        if (!src) return resolve(null);
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function wrapText(ctx, text, maxWidth) {
      const rawLines = String(text).split(/\n/);
      const lines = [];
      for (const raw of rawLines) {
        const chars = [...raw];
        let current = '';
        for (const ch of chars) {
          const test = current + ch;
          if (ctx.measureText(test).width > maxWidth && current) {
            lines.push(current);
            current = ch;
          } else {
            current = test;
          }
        }
        lines.push(current || ' ');
      }
      return lines;
    }

    async function drawShareCanvas() {
      const title = listTitleEl.value.trim() || 'Current Picks';
      const width = 1080;
      const padding = 40;
      const headerTop = 44;
      const coverSize = 132;
      const cardGap = 18;
      const innerPad = 18;
      const cardWidth = width - padding * 2;
      const textWidth = cardWidth - innerPad * 2 - coverSize - 18;

      const tempCanvas = document.createElement('canvas');
      const ctx = tempCanvas.getContext('2d');

      ctx.font = '700 46px Inter, "Segoe UI", Arial, sans-serif';
      const titleLines = wrapText(ctx, title, cardWidth - 10);
      const titleHeight = titleLines.length * 58;

      const imageCache = await Promise.all(items.map(item => loadImage(item.thumb)));

      let y = padding + headerTop + 28 + titleHeight + 54;
      const layouts = [];

      items.forEach((item, i) => {
        ctx.font = '700 34px Inter, "Segoe UI", Arial, sans-serif';
        const itemLines = wrapText(ctx, item.name, textWidth);
        ctx.font = '400 24px Inter, "Segoe UI", Arial, sans-serif';
        const reasonLines = wrapText(ctx, item.reason, textWidth);

        const textHeight = itemLines.length * 42 + 10 + reasonLines.length * 34;
        const cardHeight = Math.max(coverSize, textHeight) + innerPad * 2;

        layouts.push({
          y,
          cardHeight,
          itemLines,
          reasonLines,
          image: imageCache[i]
        });
        y += cardHeight + cardGap;
      });

      const footerHeight = 40;
      const height = y + footerHeight + padding;
      tempCanvas.width = width;
      tempCanvas.height = height;

      const g = tempCanvas.getContext('2d');
      const bg = g.createLinearGradient(0, 0, 0, height);
      bg.addColorStop(0, '#0f1319');
      bg.addColorStop(1, '#141a22');
      g.fillStyle = bg;
      g.fillRect(0, 0, width, height);

      roundRect(g, padding, padding, cardWidth, height - padding * 2, 32);
      g.fillStyle = 'rgba(255,255,255,0.02)';
      g.strokeStyle = 'rgba(255,255,255,0.08)';
      g.lineWidth = 1;
      g.fill();
      g.stroke();

      const chipX = padding + 28;
      const chipY = padding + 28;
      roundRect(g, chipX, chipY, 190, 42, 21);
      g.fillStyle = '#eef2f8';
      g.fill();
      g.fillStyle = '#11161d';
      g.font = '800 18px Inter, "Segoe UI", Arial, sans-serif';
      g.fillText('MEDIA PICKS', chipX + 18, chipY + 27);

      g.fillStyle = '#f3f6fb';
      g.font = '700 46px Inter, "Segoe UI", Arial, sans-serif';
      let titleY = padding + 118;
      titleLines.forEach(line => {
        g.fillText(line, padding + 28, titleY);
        titleY += 58;
      });

      g.fillStyle = '#aab3c4';
      g.font = '400 24px Inter, "Segoe UI", Arial, sans-serif';
      g.fillText(`${items.length} ${items.length === 1 ? 'item' : 'items'} · Generated locally`, padding + 28, titleY + 14);

      layouts.forEach((layout) => {
        const cardX = padding + 18;
        const cardY = layout.y;
        const cardW = cardWidth - 36;
        roundRect(g, cardX, cardY, cardW, layout.cardHeight, 24);
        g.fillStyle = 'rgba(255,255,255,0.03)';
        g.strokeStyle = 'rgba(255,255,255,0.08)';
        g.lineWidth = 1;
        g.fill();
        g.stroke();

        const coverX = cardX + innerPad;
        const coverY = cardY + innerPad;
        roundRect(g, coverX, coverY, coverSize, coverSize, 20);
        g.save();
        g.clip();
        if (layout.image) {
          g.drawImage(layout.image, coverX, coverY, coverSize, coverSize);
        } else {
          g.fillStyle = '#1c222c';
          g.fillRect(coverX, coverY, coverSize, coverSize);
          g.fillStyle = '#9ba5b8';
          g.font = '600 18px Inter, "Segoe UI", Arial, sans-serif';
          const noImg = 'No image';
          const w = g.measureText(noImg).width;
          g.fillText(noImg, coverX + (coverSize - w) / 2, coverY + coverSize / 2 + 8);
        }
        g.restore();

        const textX = coverX + coverSize + 18;
        let textY = coverY + 32;

        g.fillStyle = '#eef2f8';
        g.font = '700 34px Inter, "Segoe UI", Arial, sans-serif';
        layout.itemLines.forEach(line => {
          g.fillText(line, textX, textY);
          textY += 42;
        });

        textY += 8;
        g.fillStyle = '#c9d0dd';
        g.font = '400 24px Inter, "Segoe UI", Arial, sans-serif';
        layout.reasonLines.forEach(line => {
          g.fillText(line, textX, textY);
          textY += 34;
        });
      });

      g.fillStyle = '#9099aa';
      g.font = '400 18px Inter, "Segoe UI", Arial, sans-serif';
      const foot = 'Made for clean media sharing';
      const footWidth = g.measureText(foot).width;
      g.fillText(foot, width - padding - 28 - footWidth, height - 28);

      return tempCanvas;
    }

    async function shareList() {
      if (!items.length) {
        setStatus('Add at least one item first.');
        return;
      }

      renderShareBoard();
      setStatus('Generating image...');

      try {
        const canvas = await drawShareCanvas();
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        if (!blob) throw new Error('PNG generation failed');

        const title = (listTitleEl.value.trim() || 'media-share-list').replace(/[\\/:*?"<>|]+/g, '-');
        const file = new File([blob], `${title}.png`, { type: 'image/png' });

        const canNativeShare = navigator.canShare && navigator.canShare({ files: [file] });
        if (canNativeShare && navigator.share) {
          await navigator.share({ files: [file], title, text: title });
          setStatus('System share opened.');
          return;
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${title}.png`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
        setStatus('Your device does not support direct share. PNG downloaded instead.');
      } catch (err) {
        console.error(err);
        setStatus('Share failed. Try again.');
      }
    }

    shareBtn.addEventListener('click', shareList);

    load();
    renderDraftList();
    renderShareBoard();
  </script>
</body>
</html>
